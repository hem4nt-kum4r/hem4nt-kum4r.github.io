{{ define "main" }}
<div class="mt-4">
    <div>
        <h1 class="d-inline">{{ .Title }}</h1>
        {{ with .Params.github }}
        {{ partial "github.html" . }}
        {{ end }}

        {{ with .Params.live }}
        {{ partial "live.html" . }}
        {{ end }}
    </div>
    <div>
        {{ range .Params.tags }}
        <span class="badge text-bg-success">{{ . }}</span>
        {{ end }}
    </div>
    <div class="mt-3">
        <i>published on {{ .Date.Format "January 2, 2006" }}</i>
    </div>
    <div class="mt-3">
        {{ .Content }}
    </div>
</div>
{{ end }}
